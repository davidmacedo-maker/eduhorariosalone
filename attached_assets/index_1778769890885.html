    <script type="text/javascript">
      // Script para abrir o menu Config ao entrar e tratar redirecionamento
      (function() {
        // Força a abertura do menu de configurações via localStorage antes do app carregar
        localStorage.setItem('activeTab', 'configuracoes');
        localStorage.setItem('menuOpen', 'true');

        // Lógica de redirecionamento do GitHub Pages (Single Page Application)
        var redirect = sessionStorage.redirect;
        delete sessionStorage.redirect;
        if (redirect && redirect != location.href) {
          history.replaceState(null, null, redirect);
        }
      })();
    </script>
